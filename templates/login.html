{% extends "base.html" %}

{% block title %}Вход - MusicFlow{% endblock %}

{% block content %}
<style>
    .auth-container {
        max-width: 450px;
        margin: 0 auto;
    }

    .auth-card {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 3rem;
        border: 1px solid #282828;
        text-align: center;
    }

    .auth-header {
        margin-bottom: 2rem;
    }

    .auth-icon {
        font-size: 3rem;
        color: var(--primary);
        margin-bottom: 1rem;
    }

    .auth-title {
        font-size: 2rem;
        font-weight: 900;
        margin-bottom: 0.5rem;
        background: linear-gradient(45deg, var(--primary), #fff);
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .auth-subtitle {
        color: var(--text-secondary);
        font-size: 1rem;
    }

    .auth-form {
        text-align: left;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--text-primary);
    }

    .form-input {
        width: 100%;
        background: var(--background);
        border: 1px solid #535353;
        border-radius: 4px;
        padding: 0.75rem 1rem;
        color: var(--text-primary);
        font-size: 1rem;
        transition: all 0.3s;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(29, 185, 84, 0.2);
    }

    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
    }

    .checkbox {
        width: 18px;
        height: 18px;
        accent-color: var(--primary);
    }

    .checkbox-label {
        font-size: 0.9rem;
        color: var(--text-secondary);
    }

    .form-actions {
        margin-top: 2rem;
    }

    .btn-full {
        width: 100%;
        justify-content: center;
    }

    .demo-credentials {
        background: rgba(29, 185, 84, 0.05);
        border: 1px solid rgba(29, 185, 84, 0.2);
        border-radius: 8px;
        padding: 1.5rem;
        margin: 2rem 0;
        text-align: left;
        cursor: pointer;
        transition: all 0.3s;
    }

    .demo-credentials:hover {
        background: rgba(29, 185, 84, 0.1);
    }

    .demo-title {
        color: var(--primary);
        font-weight: 600;
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .demo-item {
        margin-bottom: 0.25rem;
        font-size: 0.9rem;
        color: var(--text-secondary);
    }

    .register-link {
        text-align: center;
        margin-top: 2rem;
        color: var(--text-secondary);
    }

    .register-link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
    }

    .register-link a:hover {
        text-decoration: underline;
    }
</style>

<div class="auth-container">
    <div class="auth-card">
        <!-- Заголовок -->
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-sign-in-alt"></i>
            </div>
            <h1 class="auth-title">Вход в аккаунт</h1>
            <p class="auth-subtitle">С возвращением в MusicFlow!</p>
        </div>

        <!-- Демо данные -->
        <div class="demo-credentials" id="demo-credentials">
            <div class="demo-title">
                <i class="fas fa-key"></i>
                Тестовый аккаунт
            </div>
            <div class="demo-item">Логин: <strong>demo</strong></div>
            <div class="demo-item">Пароль: <strong>demo123</strong></div>
        </div>

        <!-- Форма -->
        <form method="POST" class="auth-form" id="login-form">
            <div class="form-group">
                <label class="form-label">Имя пользователя *</label>
                <input type="text" name="username" class="form-input" placeholder="Введите имя пользователя" required id="username">
            </div>

            <div class="form-group">
                <label class="form-label">Пароль *</label>
                <input type="password" name="password" class="form-input" placeholder="Введите пароль" required id="password">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" class="checkbox" id="remember" name="remember">
                <label class="checkbox-label" for="remember">
                    Запомнить меня
                </label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-full">
                    <i class="fas fa-sign-in-alt"></i> Войти в аккаунт
                </button>
            </div>
        </form>

        <!-- Ссылка на регистрацию -->
        <div class="register-link">
            Нет аккаунта? <a href="/register">Зарегистрироваться</a>
        </div>
    </div>
</div>

<script>
// Автозаполнение демо данных
document.getElementById('demo-credentials').addEventListener('click', function() {
    document.getElementById('username').value = 'demo';
    document.getElementById('password').value = 'demo123';
});
</script>
{% endblock %}
